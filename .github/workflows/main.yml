name: Deploy Auth Inbox to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    name: Deploy Auth Inbox Worker
    steps:
      # 步骤 1: 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 步骤 2: 安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 步骤 3: 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 步骤 4: 安装依赖项
      - name: Install Dependencies
        run: pnpm install

      - name: Install Web Dependencies
        run: pnpm -C web install

      - name: Build Web App
        run: pnpm run build:web

      # 步骤 5: 部署 Worker
      - name: Deploy Backend for ${{ github.ref_name }}
        run: |

            # Write secrets.TOML to wrangler.toml file
            # 将 secrets 中的 TOML 配置写入 wrangler.toml
            echo '${{ secrets.TOML }}' > wrangler.toml

            # Deploy the worker using Wrangler
            # 使用 Wrangler 部署 Worker
            pnpm exec wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
